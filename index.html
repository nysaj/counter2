<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Counter2</title>
    <link rel="stylesheet" type="text/css" href="./style.css" />
  </head>
  <body>
    <div class="counter">
      <div class="counter-number" id="js-counter">0</div>
      <button type="button" class="button js-button" data-step="-1">-</button>
      <button type="button" class="button js-button" data-step="1">+</button>
      <button type="button" class="button js-button" data-step="-10">-10</button>
      <button type="button" class="button js-button" data-step="10">+10</button>
      <button type="button" class="button" id="js-reset-button">Reset</button>
      <p id="result"></p>
    </div>
    <script src="./counter.js"></script>
    <script src="./reset.js"></script>
  </body>
</html>
